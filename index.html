<!DOCTYPE html>
<html>
<head>
    <title>Button Click Example</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        button {
            font-size: 34px; /* Increased font size */
            padding: 10px 20px;
        }
        #image {
            max-width: 20%; /* Reduced image size */
            height: auto; /* Maintain the image's aspect ratio */
        }
        #message {
            font-size: 18px; /* Increased font size for the message */
        }
    </style>
    <script>
        function showMessage() {
            var messageElement = document.getElementById("message");
            var imageElement = document.getElementById("image");
            var buttonElement = document.getElementById("button");
            
            messageElement.innerHTML = "Happy Birthday, yaa nourrrr!🎉❤
                I think this is a great chance to let you know that you're the most wonderful person I've had the pleasure of meeting in 2023.
                Wishing you all the best in life! Enjooooooooooy your special day  🥳";

            imageElement.style.display = "block";
            buttonElement.style.display = "none";
        }
    </script>
</head>
